# ============================================================
# Spark defaults — S3A access to MinIO
# ============================================================

# S3A / MinIO configuration
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            minioadmin
spark.hadoop.fs.s3a.secret.key            minioadmin
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false

# Extra JARs (hadoop-aws + aws-sdk)
spark.jars                                /opt/spark/jars/extra/hadoop-aws-3.3.4.jar,/opt/spark/jars/extra/aws-java-sdk-bundle-1.12.367.jar

# Performance
spark.sql.adaptive.enabled                true
spark.serializer                          org.apache.spark.serializer.KryoSerializer
spark.driver.memory                       1g
spark.executor.memory                     1g

# S3A write committer — algorithm v2 writes tasks directly to final path,
# avoiding S3 server-side renames (copy+delete) which silently fail on MinIO
# when using partitionBy(). This is the critical fix for partitioned writes.
spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version  2
spark.hadoop.fs.s3a.fast.upload                               true
spark.hadoop.fs.s3a.fast.upload.buffer                        bytebuffer
