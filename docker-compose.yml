# ============================================================
# TaaSim — Transport as a Service: Docker Compose Stack
# Services: Kafka (KRaft) · MinIO · Cassandra · Flink · Spark · Grafana
# ============================================================

networks:
  taasim-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  kafka-data:
  minio-data:
  cassandra-data:
  grafana-data:

services:

  # ──────────────────────────────────────────────
  # 1. KAFKA — KRaft mode (no Zookeeper)
  # ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: taasim-kafka
    hostname: kafka
    ports:
      - "9092:29092"
      - "9093:9093"
    environment:
      # KRaft configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster — must be a valid base64 22-char string
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 4
      # Retention — 7 days for raw topics
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    user: root
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - taasim-net
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # 2. MINIO — S3-compatible object store
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    hostname: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO bucket initializer — creates raw, curated, ml, kafka-archive buckets
  minio-init:
    image: minio/mc:latest
    container_name: taasim-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/raw;
      mc mb --ignore-existing myminio/curated;
      mc mb --ignore-existing myminio/mldata;
      mc mb --ignore-existing myminio/kafka-archive;
      echo '=== MinIO buckets created ===';
      mc ls myminio;
      exit 0;
      "
    networks:
      - taasim-net

  # ──────────────────────────────────────────────
  # 2b. KAFKA CONNECT — S3 Sink to MinIO
  # ──────────────────────────────────────────────
  # ──────────────────────────────────────────────
  # 3. CASSANDRA — NoSQL serving layer
  # ──────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: TaaSimCluster
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      taasim-net:
        ipv4_address: 172.28.0.5
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # Cassandra schema initializer — creates keyspace and tables
  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./config/cassandra-init.cql:/init.cql
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Cassandra...';
      cqlsh cassandra 9042 -f /init.cql;
      echo '=== Cassandra schema initialized ===';
      "
    networks:
      - taasim-net

  # ──────────────────────────────────────────────
  # 4. FLINK — Stream processing (1 JM + 1 TM)
  # ──────────────────────────────────────────────
  flink-jobmanager:
    build: ./flink
    container_name: taasim-flink-jm
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    entrypoint: /opt/flink/entrypoint-wrapper.sh
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: s3://curated/flink-checkpoints
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - ./jars/flink:/opt/flink/lib/extra
      - ./flink/jobs:/opt/flink/jobs
      - ./data:/opt/flink/data
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  flink-taskmanager:
    build: ./flink
    entrypoint: /opt/flink/entrypoint-wrapper.sh
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 3200m
        taskmanager.memory.jvm-metaspace.size: 512m
        taskmanager.memory.task.off-heap.size: 512m
        state.backend: rocksdb
        state.checkpoints.dir: s3://curated/flink-checkpoints
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - ./jars/flink:/opt/flink/lib/extra
      - ./flink/jobs:/opt/flink/jobs
      - ./data:/opt/flink/data
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - taasim-net

  # ──────────────────────────────────────────────
  # 4b. KAFKA PRODUCERS — GPS + Trip simulators
  # Auto-start with the stack; no manual scripts needed.
  # ──────────────────────────────────────────────
  gps-producer:
    build: ./producers
    container_name: taasim-gps-producer
    hostname: gps-producer
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
    command: ["python", "vehicle_gps_producer.py", "--speed", "10"]
    volumes:
      - ./data:/data
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - taasim-net
    restart: on-failure

  trip-producer:
    build: ./producers
    container_name: taasim-trip-producer
    hostname: trip-producer
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
    command: ["python", "trip_request_producer.py", "--base-rate", "2.0"]
    volumes:
      - ./data:/data
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - taasim-net
    restart: on-failure

  # ──────────────────────────────────────────────
  # 5. SPARK — Batch processing + ML (master + worker)
  # ──────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.4-python3
    container_name: taasim-spark-master
    hostname: spark-master
    ports:
      - "8080:8080"   # Spark UI
      - "7077:7077"   # Spark master port
      - "4040:4040"   # Spark application UI
    user: root
    command: /opt/spark/sbin/start-master.sh --host spark-master --port 7077 --webui-port 8080
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_HOST: spark-master
      SPARK_DRIVER_MEMORY: 2g
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 1g
    volumes:
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./jars/spark:/opt/spark/jars/extra
      - ./spark:/opt/spark-jobs
      - ./notebooks:/opt/notebooks
      - ./scripts:/opt/scripts
      - ./data:/opt/data
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  spark-worker:
    image: apache/spark:3.5.4-python3
    container_name: taasim-spark-worker
    hostname: spark-worker
    user: root
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --memory 4g --cores 2
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: 2
    deploy:
      resources:
        limits:
          memory: 5g
        reservations:
          memory: 2g
    volumes:
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./jars/spark:/opt/spark/jars/extra
      - ./spark:/opt/spark-jobs
      - ./notebooks:/opt/notebooks
      - ./scripts:/opt/scripts
      - ./data:/opt/data
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - taasim-net

  # ──────────────────────────────────────────────
  # 6. GRAFANA — Dashboards & monitoring
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: taasim-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
      GODEBUG: netdns=cgo
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/cassandra.yml
      - ./config/grafana-dashboard-provisioning.yml:/etc/grafana/provisioning/dashboards/default.yml
      - ./config/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/taasim.json
    depends_on:
      cassandra:
        condition: service_healthy
    extra_hosts:
      - "cassandra:172.28.0.5"
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────
  # 7. KAFKA CONNECT — S3 Sink to MinIO (archival)
  # Mirrors raw.gps and raw.trips → kafka-archive/
  # ──────────────────────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect-base:7.7.0
    container_name: taasim-kafka-connect
    hostname: kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: taasim-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: "10000"
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_TOPIC: _connect-statuses
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      # AWS / MinIO credentials for the S3 Sink connector
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      /bin/bash -c "
      confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.16 &&
      /etc/confluent/docker/run
      "
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/connectors"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  # Registers the S3 Sink connector once Kafka Connect is healthy
  connect-init:
    image: curlimages/curl:8.11.0
    container_name: taasim-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./config/kafka-connect:/config
    entrypoint: >
      /bin/sh -c "
      echo 'Registering TaaSim S3 Sink connector...' &&
      curl -sf http://kafka-connect:8083/connectors/taasim-s3-sink > /dev/null
        && echo 'Connector already exists, skipping registration.'
        || curl -sf -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/config/s3-sink-connector.json &&
      echo '=== Done ===' &&
      curl -s http://kafka-connect:8083/connectors
      "
    networks:
      - taasim-net

  # ──────────────────────────────────────────────
  # 8. KAFKA UI — Browse topics, messages, consumer groups
  # ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taasim-kafka-ui
    hostname: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taasim
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: taasim-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


